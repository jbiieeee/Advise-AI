<header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="size-10 rounded-full bg-gradient-to-br from-navy to-light-blue flex items-center justify-center shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-6 text-white"><path d="M21.42 10.922a2 2 0 0 1-.019 3.018l-8.58 8.543a2 2 0 0 1-2.808.019l-8.543-8.58a2 2 0 0 1-.019-3.018l8.58-8.543a2 2 0 0 1 2.808-.019z"/><path d="M12 12h.01"/></svg>
            </div>
            <div>
                <h1 class="font-bold text-xl bg-gradient-to-r from-navy to-light-blue bg-clip-text text-transparent">Advise AI</h1>
                <p class="text-xs text-gray-600">AI Advising system</p>
            </div>
        </div>
        <div class="flex gap-3 items-center">
            {% if user.is_authenticated %}
                <span class="text-sm font-medium text-gray-700 hidden md:block">Hello, {{ user.first_name|default:user.username }}</span>
                <a href="{% if user.userprofile.role == 'student' %}{% url 'student_dashboard' %}{% elif user.userprofile.role == 'adviser' %}{% url 'adviser_dashboard' %}{% else %}{% url 'admin_dashboard' %}{% endif %}" 
                   class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2 hover:text-light-blue">Dashboard</a>
                <a href="{% url 'profile' %}" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2 hover:text-light-blue">Profile</a>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors h-10 px-4 py-2 border border-gray-200 hover:bg-gray-50 text-gray-700">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'about' %}" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2 hover:text-light-blue">About</a>
                <a href="{% url 'login' %}" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2 hover:text-light-blue">Login</a>
                <a href="{% url 'register' %}" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors h-10 px-4 py-2 bg-gradient-to-r from-navy to-light-blue hover:opacity-90 shadow-md text-white">Get Started</a>
            {% endif %}
        </div>
    </div>
</header>
